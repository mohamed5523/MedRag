services:
  weaviate:
    image: semitechnologies/weaviate:1.28.6
    container_name: weaviate
    ports:
      - "8081:8080" # Weaviate API (changed from 8080 to avoid conflict with frontend)
      - "50051:50051" # Weaviate gRPC API
    env_file:
      - ./backend/.env
    volumes:
      - weaviate_data:/var/lib/weaviate
    networks:
      - medrag
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "--spider", "--quiet", "--tries=1", "--timeout=10", "http://localhost:8080/v1/meta" ]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 30s

  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    environment:
      - OTLP_HTTP_ENDPOINT=http://phoenix:6006/v1/traces
      - WEAVIATE_URL=http://weaviate:8080
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MCP_BASE_URL=http://mcp-server:8000
    volumes:
      - ./backend/app:/app/app
      - ./backend/run.py:/app/run.py
      - ./backend/uploads:/app/uploads
    ports:
      - "8000:8000"
    networks:
      - medrag
    restart: unless-stopped
    depends_on:
      phoenix:
        condition: service_started
      weaviate:
        condition: service_healthy
      redis:
        condition: service_healthy
      mcp-server:
        condition: service_started
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://127.0.0.1:8000/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 120s

  mcp-server:
    build:
      context: ./backend/MCP
    env_file:
      - ./backend/.env
    environment:
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8000
      - PYTHONUNBUFFERED=1
    command: [ "python", "clinic_server.py" ]
    ports:
      - "8020:8000"
    networks:
      - medrag
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/providers" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - medrag
    restart: unless-stopped

  phoenix:
    image: arizephoenix/phoenix:latest
    container_name: phoenix
    ports:
      - "6006:6006" # Phoenix UI
      - "4318:4318" # OTLP HTTP receiver
    networks:
      - medrag
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
    environment:
      - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
      - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
    ports:
      - "8080:80"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - medrag
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - medrag
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
    networks:
      - medrag
    restart: unless-stopped
    depends_on:
      - prometheus

networks:
  medrag:
    driver: bridge

volumes:
  weaviate_data:
    # Optional: switch to named volumes by uncommenting and updating service volumes
    #volumes:
    #  chroma_data:
    #  uploads_data:
