services:
  weaviate:
    image: semitechnologies/weaviate:1.28.6
    container_name: weaviate
    ports:
      - "8081:8080" # Weaviate API (changed from 8080 to avoid conflict with frontend)
    env_file:
      - ./backend/.env
    volumes:
      - weaviate_data:/var/lib/weaviate
    networks:
      - medrag
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--spider",
          "--quiet",
          "--tries=1",
          "--timeout=10",
          "http://localhost:8080/v1/meta",
        ]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 30s

  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    environment:
      - OTLP_HTTP_ENDPOINT=http://phoenix:6006/v1/traces
      - WEAVIATE_URL=http://weaviate:8080
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MCP_BASE_URL=http://mcp-server:8000
    volumes:
      - ./backend/uploads:/app/uploads
    ports:
      - "8000:8000"
    networks:
      - medrag
    depends_on:
      phoenix:
        condition: service_started
      weaviate:
        condition: service_healthy
      redis:
        condition: service_healthy
      mcp-server:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/health || exit 1"] # test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 120s

  mcp-server:
    build:
      context: ./backend/MCP
    env_file:
      - ./backend/.env
    environment:
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8000
      - PYTHONUNBUFFERED=1
    command: ["python", "clinic_server.py"]
    ports:
      - "8020:8000"
    networks:
      - medrag
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/providers"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - medrag
    restart: unless-stopped

  phoenix:
    image: arizephoenix/phoenix:latest
    container_name: phoenix
    ports:
      - "6006:6006" # Phoenix UI
      - "4318:4318" # OTLP HTTP receiver
    networks:
      - medrag
    # No healthcheck needed - backend uses service_started and handles connection failures gracefully

  frontend:
    build:
      context: ./frontend
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
    environment:
      - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
      - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
    ports:
      - "8080:80"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - medrag

networks:
  medrag:
    driver: bridge

volumes:
  weaviate_data:
# Optional: switch to named volumes by uncommenting and updating service volumes
#volumes:
#  chroma_data:
#  uploads_data:
