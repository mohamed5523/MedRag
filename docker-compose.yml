
services:
  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/uploads:/app/uploads
      - ./data/chroma_db:/app/data/chroma_db
    ports:
      - "8000:8000"
    networks:
      - medrag

  frontend:
    build:
      context: ./frontend
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
    environment:
      - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
      - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - medrag

networks:
  medrag:
    driver: bridge

# Optional: switch to named volumes by uncommenting and updating service volumes
#volumes:
#  chroma_data:
#  uploads_data:
